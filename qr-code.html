<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birthday Special - QR Code</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #FFD5B8 0%, #FFB6C1 50%, #E8627A 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Quicksand', -apple-system, BlinkMacSystemFont, sans-serif;
            padding: 2rem;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 3rem 2rem;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(196, 69, 105, 0.3);
            text-align: center;
        }

        h1 {
            font-family: 'Sacramento', cursive;
            font-size: 2.5rem;
            color: #C44569;
            margin-bottom: 0.5rem;
            text-shadow: 0 2px 10px rgba(196, 69, 105, 0.2);
        }

        .subtitle {
            font-family: 'Caveat', cursive;
            font-size: 1.3rem;
            color: #8B5FBF;
            margin-bottom: 2rem;
        }

        #qrcode {
            display: flex;
            justify-content: center;
            margin: 2rem 0;
            padding: 1.5rem;
            background: white;
            border-radius: 20px;
            border: 3px solid #FFB6C1;
        }

        #qrcode canvas, #qrcode img {
            max-width: 100%;
        }

        .url-display {
            margin: 2rem 0;
            padding: 1rem;
            background: #FFF1D6;
            border-radius: 15px;
            border-left: 4px solid #FFB088;
            word-break: break-all;
            font-size: 0.9rem;
            color: #4A2E3C;
        }

        .instructions {
            margin-top: 2rem;
            padding: 1.5rem;
            background: #FFCEDA;
            border-radius: 15px;
            color: #8B1F3D;
            font-size: 0.95rem;
            line-height: 1.6;
        }

        .instructions strong {
            display: block;
            margin-bottom: 0.5rem;
            color: #C44569;
        }

        .download-btn {
            margin-top: 1.5rem;
            padding: 1rem 2rem;
            background: linear-gradient(135deg, #FFB088 0%, #E8627A 100%);
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
            box-shadow: 0 8px 20px rgba(196, 69, 105, 0.3);
        }

        .download-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 30px rgba(196, 69, 105, 0.4);
        }

        .emoji {
            font-size: 2rem;
            margin-bottom: 1rem;
        }

        @media (max-width: 480px) {
            .container {
                padding: 2rem 1.5rem;
            }

            h1 {
                font-size: 2rem;
            }

            #qrcode {
                padding: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="emoji">✨💕✨</div>
        <h1>For Mehr</h1>
        <p class="subtitle">~ a journey through the sky ~</p>

        <div id="qrcode"></div>

        <div class="url-display" id="urlDisplay">
            Loading your Vercel URL...
        </div>

        <div class="instructions">
            <strong>💫 How to use:</strong>
            1. Scan this QR code with your phone camera<br>
            2. It will open the birthday website<br>
            3. Share this QR code to surprise her! 💕
        </div>

        <button class="download-btn" onclick="downloadQR()">📥 Download QR Code</button>
    </div>

    <script>
        // Get the current domain/URL
        function generateQR() {
            const currentUrl = window.location.origin.replace('qr-code.html', '');
            document.getElementById('urlDisplay').textContent = currentUrl;

            // Clear previous QR code
            document.getElementById('qrcode').innerHTML = '';

            // Generate new QR code
            new QRCode(document.getElementById('qrcode'), {
                text: currentUrl,
                width: 300,
                height: 300,
                colorDark: '#C44569',
                colorLight: '#FFFFFF',
                correctLevel: QRCode.CorrectLevel.H
            });
        }

        function downloadQR() {
            const canvas = document.querySelector('#qrcode canvas');
            if (!canvas) {
                alert('QR Code not generated yet. Please wait a moment.');
                return;
            }

            const link = document.createElement('a');
            link.href = canvas.toDataURL('image/png');
            link.download = 'birthday-special-qr-code.png';
            link.click();
        }

        // Generate QR code when page loads
        window.addEventListener('load', generateQR);
    </script>
</body>
</html>
