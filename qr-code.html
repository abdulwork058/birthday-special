<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birthday Special - QR Code Card</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&family=Sacramento&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #FFD5B8 0%, #FFB6C1 50%, #E8627A 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Quicksand', -apple-system, BlinkMacSystemFont, sans-serif;
            padding: 2rem;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 3rem 2rem;
            max-width: 700px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(196, 69, 105, 0.3);
            text-align: center;
        }

        h1 {
            font-family: 'Sacramento', cursive;
            font-size: 2.5rem;
            color: #C44569;
            margin-bottom: 0.5rem;
            text-shadow: 0 2px 10px rgba(196, 69, 105, 0.2);
        }

        .subtitle {
            font-family: 'Caveat', cursive;
            font-size: 1.3rem;
            color: #8B5FBF;
            margin-bottom: 2rem;
        }

        .card-preview {
            margin: 2rem 0;
            background: linear-gradient(135deg, #FFF5F0 0%, #FFECF0 100%);
            border-radius: 20px;
            padding: 2rem;
            border: 3px dashed #FFB6C1;
            position: relative;
        }

        .card-content {
            position: relative;
            z-index: 2;
        }

        .card-title {
            font-family: 'Sacramento', cursive;
            font-size: 2.2rem;
            color: #C44569;
            margin-bottom: 0.5rem;
        }

        .card-subtitle {
            font-family: 'Caveat', cursive;
            font-size: 1.1rem;
            color: #8B5FBF;
            margin-bottom: 1.5rem;
        }

        #qrcode {
            display: flex;
            justify-content: center;
            margin: 1.5rem 0;
            padding: 1rem;
            background: white;
            border-radius: 15px;
            border: 2px solid #FFB6C1;
        }

        #qrcode canvas, #qrcode img {
            max-width: 100%;
            filter: drop-shadow(0 5px 15px rgba(196, 69, 105, 0.15));
        }

        .card-message {
            font-size: 0.95rem;
            color: #4A2E3C;
            margin-top: 1.5rem;
            font-style: italic;
            line-height: 1.6;
        }

        .card-hint {
            margin-top: 1rem;
            padding: 0.8rem;
            background: rgba(255, 176, 193, 0.2);
            border-radius: 10px;
            font-size: 0.85rem;
            color: #8B1F3D;
        }

        .url-display {
            margin: 2rem 0;
            padding: 1rem;
            background: #FFF1D6;
            border-radius: 15px;
            border-left: 4px solid #FFB088;
            word-break: break-all;
            font-size: 0.85rem;
            color: #4A2E3C;
        }

        .button-group {
            display: flex;
            gap: 1rem;
            margin-top: 2rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        .download-card-btn, .regenerate-btn {
            padding: 1rem 2rem;
            background: linear-gradient(135deg, #FFB088 0%, #E8627A 100%);
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
            box-shadow: 0 8px 20px rgba(196, 69, 105, 0.3);
            flex: 1;
            min-width: 180px;
        }

        .regenerate-btn {
            background: linear-gradient(135deg, #8B5FBF 0%, #C44569 100%);
        }

        .download-card-btn:hover, .regenerate-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 30px rgba(196, 69, 105, 0.4);
        }

        .emoji {
            font-size: 2rem;
            margin-bottom: 1rem;
        }

        @media (max-width: 480px) {
            .container {
                padding: 2rem 1.5rem;
            }

            h1 {
                font-size: 2rem;
            }

            .card-preview {
                padding: 1.5rem;
            }

            .button-group {
                flex-direction: column;
            }

            .download-card-btn, .regenerate-btn {
                min-width: auto;
            }

            #qrcode {
                padding: 0.75rem;
            }
        }

        /* Hidden canvas for card generation */
        #cardCanvas {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="emoji">✨💕✨</div>
        <h1>For Mehr</h1>
        <p class="subtitle">~ a journey through the sky ~</p>

        <div class="card-preview">
            <div class="card-content">
                <div class="card-title">🎂 Happy Birthday! 🎂</div>
                <div class="card-subtitle">Something special awaits...</div>

                <div id="qrcode"></div>

                <div class="card-message">
                    Scan this QR code to unlock your birthday surprise! 🎉
                </div>

                <div class="card-hint">
                    📱 Just point your phone camera at the code above
                </div>
            </div>
        </div>

        <div class="url-display" id="urlDisplay">
            Loading your Vercel URL...
        </div>

        <div class="button-group">
            <button class="download-card-btn" onclick="downloadCard()">📥 Download Card</button>
            <button class="regenerate-btn" onclick="regenerateQR()">🔄 Regenerate</button>
        </div>
    </div>

    <!-- Hidden canvas for high-res card generation -->
    <canvas id="cardCanvas" width="800" height="1000"></canvas>

    <script>
        let currentUrl = '';
        let cardImageData = null;

        // Get the current domain/URL
        function generateQR() {
            currentUrl = window.location.origin.replace('qr-code.html', '');
            document.getElementById('urlDisplay').textContent = currentUrl;

            // Clear previous QR code
            document.getElementById('qrcode').innerHTML = '';

            // Generate new QR code
            new QRCode(document.getElementById('qrcode'), {
                text: currentUrl,
                width: 280,
                height: 280,
                colorDark: '#C44569',
                colorLight: '#FFFFFF',
                correctLevel: QRCode.CorrectLevel.H
            });

            // Generate card image after QR is created
            setTimeout(generateCardImage, 200);
        }

        function generateCardImage() {
            const cardCanvas = document.getElementById('cardCanvas');
            const ctx = cardCanvas.getContext('2d');
            const width = 800;
            const height = 1000;

            // Background gradient
            const gradient = ctx.createLinearGradient(0, 0, 0, height);
            gradient.addColorStop(0, '#FFF5F0');
            gradient.addColorStop(1, '#FFECF0');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, width, height);

            // Decorative border
            ctx.strokeStyle = '#FFB6C1';
            ctx.lineWidth = 8;
            ctx.strokeRect(20, 20, width - 40, height - 40);

            // Inner decorative border
            ctx.strokeStyle = '#FFB088';
            ctx.lineWidth = 3;
            ctx.strokeRect(35, 35, width - 70, height - 70);

            // Title
            ctx.fillStyle = '#C44569';
            ctx.font = 'bold 48px "Sacramento", cursive';
            ctx.textAlign = 'center';
            ctx.fillText('🎂 Happy Birthday! 🎂', width / 2, 100);

            // Subtitle
            ctx.fillStyle = '#8B5FBF';
            ctx.font = '32px "Caveat", cursive';
            ctx.fillText('Something special awaits...', width / 2, 150);

            // Get QR code canvas and draw it
            const qrCanvas = document.querySelector('#qrcode canvas');
            if (qrCanvas) {
                const qrSize = 280;
                const qrX = (width - qrSize) / 2;
                const qrY = (height - qrSize) / 2 - 50;
                ctx.drawImage(qrCanvas, qrX, qrY, qrSize, qrSize);
            }

            // Message below QR
            ctx.fillStyle = '#4A2E3C';
            ctx.font = '24px "Caveat", cursive';
            ctx.textAlign = 'center';
            ctx.fillText('Scan to unlock your surprise! 🎉', width / 2, height - 150);

            // Instructions
            ctx.fillStyle = '#8B1F3D';
            ctx.font = '18px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('📱 Point your phone camera at the code', width / 2, height - 100);

            // Save card image
            cardImageData = cardCanvas.toDataURL('image/png');
        }

        function downloadCard() {
            if (!cardImageData) {
                alert('Card not generated yet. Please wait a moment.');
                return;
            }

            const link = document.createElement('a');
            link.href = cardImageData;
            link.download = 'Mehr-Birthday-Card.png';
            link.click();
        }

        function regenerateQR() {
            generateQR();
        }

        // Generate QR code when page loads
        window.addEventListener('load', generateQR);
    </script>
</body>
</html>
