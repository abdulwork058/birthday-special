<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mehr - Heart QR Code</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #FFD5B8 0%, #FFB6C1 50%, #E8627A 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Quicksand', -apple-system, BlinkMacSystemFont, sans-serif;
            padding: 2rem;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 3rem 2rem;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(196, 69, 105, 0.3);
            text-align: center;
        }

        h1 {
            font-family: 'Sacramento', cursive;
            font-size: 2.5rem;
            color: #C44569;
            margin-bottom: 0.5rem;
            text-shadow: 0 2px 10px rgba(196, 69, 105, 0.2);
        }

        .subtitle {
            font-family: 'Caveat', cursive;
            font-size: 1.3rem;
            color: #8B5FBF;
            margin-bottom: 2rem;
        }

        .qr-display {
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 2rem 0;
            min-height: 350px;
            position: relative;
        }

        canvas {
            max-width: 100%;
            filter: drop-shadow(0 10px 30px rgba(196, 69, 105, 0.2));
        }

        .url-display {
            margin: 2rem 0;
            padding: 1rem;
            background: #FFF1D6;
            border-radius: 15px;
            border-left: 4px solid #FFB088;
            word-break: break-all;
            font-size: 0.9rem;
            color: #4A2E3C;
        }

        .instructions {
            margin-top: 2rem;
            padding: 1.5rem;
            background: #FFCEDA;
            border-radius: 15px;
            color: #8B1F3D;
            font-size: 0.95rem;
            line-height: 1.6;
        }

        .instructions strong {
            display: block;
            margin-bottom: 0.5rem;
            color: #C44569;
        }

        .button-group {
            display: flex;
            gap: 1rem;
            margin-top: 1.5rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        .download-btn, .regenerate-btn {
            padding: 1rem 1.5rem;
            background: linear-gradient(135deg, #FFB088 0%, #E8627A 100%);
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
            box-shadow: 0 8px 20px rgba(196, 69, 105, 0.3);
            flex: 1;
            min-width: 150px;
        }

        .regenerate-btn {
            background: linear-gradient(135deg, #8B5FBF 0%, #C44569 100%);
        }

        .download-btn:hover, .regenerate-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 30px rgba(196, 69, 105, 0.4);
        }

        .emoji {
            font-size: 2rem;
            margin-bottom: 1rem;
        }

        .loading {
            display: none;
            font-size: 1.2rem;
            color: #C44569;
            font-weight: 600;
        }

        @media (max-width: 480px) {
            .container {
                padding: 2rem 1.5rem;
            }

            h1 {
                font-size: 2rem;
            }

            .button-group {
                flex-direction: column;
            }

            .download-btn, .regenerate-btn {
                min-width: auto;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="emoji">💕✨💕</div>
        <h1>For Mehr</h1>
        <p class="subtitle">~ scan your heart ~</p>

        <div class="qr-display">
            <div class="loading" id="loading">Generating heart QR code...</div>
            <canvas id="heartCanvas" width="350" height="350"></canvas>
        </div>

        <div class="url-display" id="urlDisplay">
            Loading your Vercel URL...
        </div>

        <div class="instructions">
            <strong>💫 How to use:</strong>
            1. Scan this heart-shaped QR code<br>
            2. It will open the birthday website<br>
            3. Print it or share it with Mehr! 💕
        </div>

        <div class="button-group">
            <button class="download-btn" onclick="downloadQR()">📥 Download Heart QR</button>
            <button class="regenerate-btn" onclick="regenerateQR()">🔄 Regenerate</button>
        </div>
    </div>

    <script>
        let qrCodeData = null;

        function generateHeartQR() {
            document.getElementById('loading').style.display = 'block';
            const currentUrl = window.location.origin.replace('qr-heart.html', '');
            document.getElementById('urlDisplay').textContent = currentUrl;

            // Generate QR code with higher error correction for better visibility through heart shape
            const qr = new QRCode({
                text: currentUrl,
                width: 350,
                height: 350,
                colorDark: '#C44569',
                colorLight: '#FFFFFF',
                correctLevel: QRCode.CorrectLevel.H,
                useSVG: false
            });

            // Get the canvas from QR code
            const tempContainer = document.createElement('div');
            qr.makeCode(currentUrl);
            const qrCanvas = qr._canvas;

            if (qrCanvas) {
                // Draw heart-shaped QR code
                drawHeartQR(qrCanvas, currentUrl);
            }
        }

        function drawHeartQR(sourceCanvas, text) {
            const canvas = document.getElementById('heartCanvas');
            const ctx = canvas.getContext('2d');
            const size = 350;

            // Clear canvas
            ctx.clearRect(0, 0, size, size);

            // Save context
            ctx.save();

            // Create heart clipping path
            ctx.beginPath();
            drawHeartPath(ctx, size / 2, size / 2, size * 0.35);
            ctx.clip();

            // Draw QR code inside heart
            ctx.drawImage(sourceCanvas, 0, 0, size, size);

            // Restore context
            ctx.restore();

            // Draw heart border
            ctx.strokeStyle = '#C44569';
            ctx.lineWidth = 3;
            ctx.beginPath();
            drawHeartPath(ctx, size / 2, size / 2, size * 0.35);
            ctx.stroke();

            // Draw white circle for text background
            const centerX = size / 2;
            const centerY = size / 2 + size * 0.05;
            const circleRadius = size * 0.12;

            ctx.fillStyle = 'rgba(255, 255, 255, 0.95)';
            ctx.beginPath();
            ctx.arc(centerX, centerY, circleRadius, 0, Math.PI * 2);
            ctx.fill();

            ctx.strokeStyle = '#C44569';
            ctx.lineWidth = 2;
            ctx.stroke();

            // Draw "Mehr" text in center
            ctx.fillStyle = '#C44569';
            ctx.font = 'bold 28px "Sacramento", cursive';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('Mehr', centerX, centerY);

            document.getElementById('loading').style.display = 'none';
            qrCodeData = canvas.toDataURL('image/png');
        }

        function drawHeartPath(ctx, x, y, size) {
            ctx.moveTo(x, y + size * 0.5);
            ctx.bezierCurveTo(
                x - size * 0.75, y - size * 0.25,
                x - size * 0.75, y - size * 0.65,
                x - size * 0.25, y - size * 0.65
            );
            ctx.bezierCurveTo(
                x + size * 0.1, y - size * 0.65,
                x + size * 0.35, y - size * 0.35,
                x, y - size * 0.1
            );
            ctx.bezierCurveTo(
                x - size * 0.35, y - size * 0.35,
                x - size * 0.1, y - size * 0.65,
                x + size * 0.25, y - size * 0.65
            );
            ctx.bezierCurveTo(
                x + size * 0.75, y - size * 0.65,
                x + size * 0.75, y - size * 0.25,
                x, y + size * 0.5
            );
            ctx.closePath();
        }

        function downloadQR() {
            if (!qrCodeData) {
                alert('QR Code not generated yet. Please wait a moment.');
                return;
            }

            const link = document.createElement('a');
            link.href = qrCodeData;
            link.download = 'Mehr-Heart-QR-Code.png';
            link.click();
        }

        function regenerateQR() {
            document.getElementById('loading').style.display = 'block';
            setTimeout(() => {
                generateHeartQR();
            }, 300);
        }

        // Generate QR code when page loads
        window.addEventListener('load', generateHeartQR);
    </script>
</body>
</html>
